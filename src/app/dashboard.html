<div class="dashboard-container">
  <app-sidebar [visible]="drawerVisible()" (visibleChange)="drawerVisible.set($event)" [companyName]="companyName()"></app-sidebar>

  <main class="main-content">
    <app-page-header
      title="Dashboard"
      [subtitle]="headerSubtitle()"
      [companyName]="companyName()"
      [showNewClaim]="true"
      (menuToggle)="drawerVisible.set(true)" />

    @defer {
      <section class="stats-grid">
        <app-dashboard-card
          title="Total Revenue"
          value="$124,500"
          subtitle="+12.5% from last month"
          icon="pi-dollar"
          trend="up"
          trendValue="+12.5%"
          color="purple"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Active Users"
          value="8,432"
          subtitle="+5.2% from last month"
          icon="pi-users"
          trend="up"
          trendValue="+5.2%"
          color="blue"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Projects"
          value="24"
          subtitle="3 in progress"
          icon="pi-briefcase"
          trend="neutral"
          color="green"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Conversion Rate"
          value="3.2%"
          subtitle="-0.8% from last month"
          icon="pi-chart-bar"
          trend="down"
          trendValue="-0.8%"
          color="orange"
        ></app-dashboard-card>
      </section>
    }

    @defer {
      <section class="content-section">
        <div class="content-card">
          <h2 class="section-title">Recent Activity</h2>
          <div class="activity-list">
            <div class="activity-item">
              <div class="activity-icon completed"></div>
              <div class="activity-details">
                <p class="activity-title">Project Alpha completed</p>
                <p class="activity-time">2 hours ago</p>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-icon pending"></div>
              <div class="activity-details">
                <p class="activity-title">New user registration</p>
                <p class="activity-time">4 hours ago</p>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-icon in-progress"></div>
              <div class="activity-details">
                <p class="activity-title">Dashboard update in progress</p>
                <p class="activity-time">6 hours ago</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    }
  </main>
</div>
