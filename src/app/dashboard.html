<div class="dashboard-container">
  <app-sidebar [visible]="drawerVisible()" (visibleChange)="drawerVisible.set($event)" [companyName]="companyName()"></app-sidebar>

  <main class="main-content">
    <app-page-header
      title="Dashboard"
      [subtitle]="headerSubtitle()"
      [companyName]="companyName()"
      [showNewClaim]="true"
      (menuToggle)="drawerVisible.set(true)" />

    <app-floating-menu-button [drawerOpen]="drawerVisible()" (menuToggle)="drawerVisible.set(!drawerVisible())" />

    @defer {
      <section class="stats-grid">
        <app-dashboard-card
          title="Total Revenue"
          value="$124,500"
          subtitle="+12.5% from last month"
          icon="pi-dollar"
          trend="up"
          trendValue="+12.5%"
          color="purple"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Active Users"
          value="8,432"
          subtitle="+5.2% from last month"
          icon="pi-users"
          trend="up"
          trendValue="+5.2%"
          color="blue"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Projects"
          value="24"
          subtitle="3 in progress"
          icon="pi-briefcase"
          trend="neutral"
          color="green"
        ></app-dashboard-card>

        <app-dashboard-card
          title="Conversion Rate"
          value="3.2%"
          subtitle="-0.8% from last month"
          icon="pi-chart-bar"
          trend="down"
          trendValue="-0.8%"
          color="orange"
        ></app-dashboard-card>
      </section>
    }

    @defer {
      <section class="content-section">
        <div class="content-card">
          <h2 class="section-title">Task Board</h2>
          <app-kanban-board />
        </div>
      </section>
    }

    @defer {
      <section class="dashboard-bottom-grid">
        <app-claims-chart />
        <app-recent-activity />
      </section>
    }
  </main>
</div>
