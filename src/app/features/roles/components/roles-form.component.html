<app-sidebar [visible]="drawerVisible()" (visibleChange)="drawerVisible.set($event)"></app-sidebar>

<div class="roles-page">
  <app-page-header
    [title]="isEdit() ? 'Edit Role' : 'New Role'"
    subtitle="Manage role details and permissions"
    (menuToggle)="drawerVisible.set(true)" />

  <div class="form-header">
    <button class="btn btn--ghost" type="button" (click)="onCancel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>Back</span>
    </button>
    <h1>{{ isEdit() ? 'Edit Role' : 'New Role' }}</h1>
  </div>

  <div class="card-modern form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <!-- Name -->
        <div class="form-field">
          <label for="name">Name <span class="required">*</span></label>
          <input
            id="name"
            type="text"
            pInputText
            formControlName="name"
            placeholder="Enter role name"
            class="form-input" />
          @if (form.get('name')?.invalid && form.get('name')?.touched) {
            <span class="field-error">Name is required (min 2 characters)</span>
          }
        </div>

        <!-- Description -->
        <div class="form-field">
          <label for="description">Description</label>
          <input
            id="description"
            type="text"
            pInputText
            formControlName="description"
            placeholder="Enter role description"
            class="form-input" />
        </div>

        <!-- Permissions -->
        <div class="form-field form-field--full">
          <label for="permissions">Permissions</label>
          <p-multiSelect
            id="permissions"
            formControlName="permissionIds"
            [options]="permissions()"
            optionLabel="name"
            optionValue="id"
            placeholder="Select permissions"
            [showClear]="true"
            styleClass="form-multiselect" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn--ghost" type="button" (click)="onCancel()">Cancel</button>
        <button class="btn btn--primary" type="submit" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="spinner"></span>
          }
          {{ isEdit() ? 'Update Role' : 'Create Role' }}
        </button>
      </div>
    </form>
  </div>
</div>
