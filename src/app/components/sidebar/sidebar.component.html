<p-drawer
  [(visible)]="visible"
  position="left"
  styleClass="app-drawer"
  [showCloseIcon]="true"
  [modal]="true"
  [dismissible]="true">

  <ng-template #header>
    <div class="logo">
      <img [src]="isDark() ? '/Logo%20PNG-WHITE.png' : '/Logo%20PNG.png'" alt="Logo" class="logo-img" />
      <span>{{ companyName() }}</span>
    </div>
  </ng-template>

  <nav class="sidebar-nav">
    @for (item of menuItems(); track item.label) {
      @if (item.children?.length) {
        <div class="menu-group" [class.open]="isGroupOpen(item)">
          <button
            class="menu-item menu-group-toggle"
            [class.active]="groupHasActive(item)"
            type="button"
            [attr.aria-expanded]="isGroupOpen(item)"
            [attr.aria-label]="item.label"
            (click)="toggleGroup(item.label)">
            <i class="menu-icon {{ item.icon }}"></i>
            <span class="menu-label">{{ item.label }}</span>
            <i class="menu-chevron pi pi-chevron-down" [class.rotated]="isGroupOpen(item)"></i>
          </button>
          @if (isGroupOpen(item)) {
            <div class="menu-submenu">
              @for (child of item.children; track child.label) {
                <button
                  class="menu-item menu-subitem"
                  [class.active]="isActive(child.route)"
                  type="button"
                  [attr.aria-label]="child.label"
                  (click)="navigate(child.route)">
                  <i class="menu-icon {{ child.icon }}"></i>
                  <span class="menu-label">{{ child.label }}</span>
                  @if (isActive(child.route)) {
                    <span class="menu-indicator"></span>
                  }
                </button>
              }
            </div>
          }
        </div>
      } @else {
        <button
          class="menu-item"
          [class.active]="isActive(item.route)"
          type="button"
          [attr.aria-label]="item.label"
          (click)="navigate(item.route)">
          <i class="menu-icon {{ item.icon }}"></i>
          <span class="menu-label">{{ item.label }}</span>
          @if (isActive(item.route)) {
            <span class="menu-indicator"></span>
          }
        </button>
      }
    }
  </nav>

  <ng-template #footer>
    <div class="sidebar-footer">
      <button class="user-profile" (click)="goToProfile()" type="button" aria-label="Go to profile">
        @if (user()?.profilePhotoUrl) {
          <img [src]="user()?.profilePhotoUrl" alt="Profile" class="user-avatar-photo" />
        } @else {
          <div class="user-avatar">
            <span>{{ userInitials }}</span>
          </div>
        }
        <div class="user-info">
          <p class="user-name">{{ user()?.name }} {{ user()?.lastName }}</p>
          <p class="user-role">{{ primaryRole }}</p>
        </div>
      </button>

      <!-- Theme toggle -->
      <div class="theme-toggle">
        <div class="theme-toggle-label">
          <i class="pi" [class.pi-sun]="!isDark()" [class.pi-moon]="isDark()"></i>
          <span>{{ isDark() ? 'Dark' : 'Light' }} mode</span>
        </div>
        <p-toggleswitch
          [ngModel]="isDark()"
          (ngModelChange)="onThemeToggle($event)"
          ariaLabel="Toggle dark/light theme" />
      </div>
    </div>
  </ng-template>
</p-drawer>
